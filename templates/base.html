<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Predictive Logistics Control Tower{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-body-tertiary">
    <header class="border-bottom bg-body">
      <div class="container py-3 d-flex align-items-center justify-content-between gap-3">
        <a class="text-decoration-none" href="/">
          <span class="fw-semibold">Control Tower</span>
        </a>
        <nav class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="/admin/">Admin</a>
        </nav>
      </div>
    </header>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
