services:
  - type: web
    name: control-tower-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn control_tower.wsgi:application --workers ${WEB_CONCURRENCY:-2} --threads ${GUNICORN_THREADS:-4} --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: control-tower-db
          property: connectionString
      - key: LIVE_UPDATES_POLL_SECONDS
        value: "5"
      - key: MAX_DASHBOARD_SHIPMENTS
        value: "25"
      - key: WEATHER_CACHE_TTL_SECONDS
        value: "300"
      - key: TRAFFIC_CACHE_TTL_SECONDS
        value: "180"
      - key: AI_EXPLANATION_TTL_MINUTES
        value: "10"

  - type: cron
    name: control-tower-refresh
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py refresh_live_data --once
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: control-tower-db
          property: connectionString
      - key: MAX_DASHBOARD_SHIPMENTS
        value: "25"
      - key: WEATHER_CACHE_TTL_SECONDS
        value: "300"
      - key: TRAFFIC_CACHE_TTL_SECONDS
        value: "180"
      - key: AI_EXPLANATION_TTL_MINUTES
        value: "10"

databases:
  - name: control-tower-db
    plan: free
